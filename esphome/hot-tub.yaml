# Balboa GS501Z / VL260 hot tub controller — PRODUCTION ESPHome firmware.
#
# Reads the J2 topside-display bus AND writes button presses through direct
# ESP32 GPIO drive (no opto/relay/transistor — discovered 2026-06-23 that the
# existing 1 kΩ tap is sufficient current-limiting). Closed-loop setpoint
# control via the ride-the-bounce algorithm from sim/setpoint_sim.py.
#
# The previous content of this file (RS485 attempt using
# brianfeucht/esphome-balboa-spa) was based on the wrong-protocol theory; the
# GS501Z J2 isn't RS485 at all, it's the display bus. Git history has the
# previous version if you need it for reference.
#
# DEVICE NAME = `hot-tub` — gives entity IDs `hot_tub_*` (matches README).
# Migration step (2026-06-23): user removed the dead `cabin_hot_tub_*` device
# (failed RS485 firmware) and the transient `balboa_decoder_*` device used
# during today's bring-up; this firmware is the production replacement.
# When you re-add the device in HA it will discover via mDNS at hot-tub.local;
# the API encryption key to paste is the value of `api_key` in secrets.yaml.
#
# WIRING (568B, each tap via 1 kΩ–2.2 kΩ series resistor):
#   pin 1 (white/orange, +5V) -> ESP VIN  (parasitic power, see brownout notes)
#   pin 4 (blue)        -> ESP GND     (mandatory common ref)
#   pin 5 (white/blue)  -> GPIO34      DATA (input-only)
#   pin 6 (green)       -> GPIO35      CLOCK (input-only)
#   pin 2 (orange)      -> GPIO33      Light button
#   pin 3 (white/green) -> GPIO4       Jets button
#   pin 7 (white/brown) -> GPIO16      Blower button
#   pin 8 (brown)       -> GPIO17      Temp button
#
# J2 pin 1 (+5V) parasitic-power CAVEAT: the Balboa's internal SMPS that drives
# this rail is sized for the panel display (~50-100 mA) and is BADLY overloaded
# by the ESP's WiFi association spikes (~250+ mA at default TX power), causing
# boot-time brownouts. Mitigation in this YAML: `wifi: output_power: 14dB` etc.
# below. Long-term fix: disconnect J2 pin 1 and run a proper aux 5V PSU,
# keeping J2 pin 4 GND tied for the common signal reference. See
# project_hot_tub_brownouts memory for the full plan.
#
# 1-Wire DS18B20 temperature sensors (water + ambient):
#   GPIO32              -> shared DATA bus (4.7 kΩ pull-up to 3.3V required)
#   Both sensors wire in parallel: VCC -> 3.3V, GND -> GND, DATA -> GPIO32.
#   Sensors auto-discovered by unique 64-bit serial; addresses pasted below
#   after first boot logs them. Use waterproof stainless-probe versions for
#   the ambient (cabinet-exterior, exposed to weather) and water sensors.
#
# DHT11 cabinet temp/humidity sensor (NB: "DHT one-wire" ≠ Dallas 1-Wire):
#   VCC -> 3.3V, GND -> GND, DATA -> GPIO13. Most DHT11 modules carry an
#   on-board pull-up; if you have a bare 3-pin part, add 4.7–10 kΩ to 3.3V.
#
# Reed switch — hot tub lid open/close detector:
#   One terminal -> GPIO14 (internal pull-up enabled in software).
#   Other terminal -> GND. Magnet on the lid, reed body on the cabinet rim
#   so closing the lid brings them together (= contact closed = line LOW =
#   lid CLOSED). Open lid = line HIGH = HA reports "Open".
#
# Button output pins use ESPHome's `output: platform: gpio` which configures
# them as OUTPUT LOW at boot. To "press" a button, drive HIGH for ~80 ms,
# then back to LOW. Current is ≤3.3 mA through the 1 kΩ resistor — well
# below any damage threshold and confirmed safe by today's bench tests.

substitutions:
  UNITS: "C"
  press_pulse: "80ms"          # tune empirically per-button if needed
  walk_interpress: "1500ms"    # gap between temp presses during setpoint walk
  walk_commit_wait: "3000ms"   # set-mode timeout after last press
  walk_max_iters: "35"         # safety cap (sim worst case is 28)

esphome:
  name: hot-tub
  on_boot:
    # Fire after WiFi + API are up (priority -100 = late in the boot sequence).
    # Self-heals the "set_temp = unknown after boot until someone interacts" case:
    # the decoder only sees a setpoint while the panel is in set-mode, and the
    # spa never enters set-mode on its own. One Temp press wakes set-mode,
    # decoder catches the value, set_temp populates within ~1.5 s.
    priority: -100
    then:
      - script.execute: capture_setpoint_at_boot

esp32:
  board: esp32dev
  framework:
    type: esp-idf      # vendored kgstorm component requires esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Boot-current trimming (added 2026-06-28). ESP32 is parasitically powered
  # from the Balboa J2 pin 1 (+5V) line — a tiny SMPS inside the spa controller
  # sized for the panel display (~100 mA) and badly overloaded by the ESP's
  # WiFi-association current spikes (≥250 mA at default 20 dBm), producing
  # boot-time brownouts at the 2.43V detector threshold. Three knobs here cut
  # the spike; each is reversible if signal quality degrades.
  #
  # 1. `output_power: 14dB` (= 25 mW) drops association-burst current from
  #    ~250 mA to ~150 mA. Signal at the bench cabinet has measured -49 dBm
  #    (≥25 dB fade margin) so dropping to 14 dBm leaves ~19 dB — still
  #    healthy. Tune again once the final perfboard/enclosure is in place,
  #    since the cabinet metalwork can swing this 15-20 dB.
  # 2. `fast_connect: true` skips the network scan on boot; reaches API ~3 s
  #    sooner. Safe for a fixed home AP; falls back gracefully if AP roams.
  # 3. `power_save_mode: light` drops idle current ~80 mA → ~20 mA between
  #    TX bursts, so the on-board decoupling holds longer between spikes.
  #    Trade-off: a few-ms latency on incoming API messages — imperceptible
  #    for button presses.
  output_power: 14dB
  fast_connect: true
  power_save_mode: light
  ap:
    ssid: "hot-tub-fallback"
    password: !secret ota_password

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

# Relaxed safe_mode rollback. The dormant-cycle supply transitions cause
# transient brownouts (PSU sag during WiFi TX bursts on top of marginal
# supply); at default `num_attempts: 10` + `boot_is_good_after: 60s`,
# new firmware kept getting rolled back to the previous partition before
# it could commit. With 100 attempts and a 5s commit window, the device
# survives the brownout chain so OTA changes actually stick.
safe_mode:
  num_attempts: 100
  boot_is_good_after: 5s

logger:
  level: INFO

# Browser readout over WiFi: http://hot-tub.local/
web_server:
  port: 80

# Vendored kgstorm decoder component (patched for GS501Z bit map + blower stability)
external_components:
  - source:
      type: local
      path: components

# ===== 1-Wire bus for DS18B20 temp sensors (water + ambient) =====
# After first flash, check the logs for lines like:
#   [I][dallas_temp:...]: 'Water Temp (probe)': Found device 0x...
# Copy each discovered 64-bit address into the matching `address:` field below
# so the right physical probe maps to the right HA entity (without an address
# the binding is order-of-enumeration and can swap on reboot).
one_wire:
  - platform: gpio
    pin: GPIO32

# ===== Display-bus decode (read-only) =====
sensor:
  - platform: inputs
    id: display_handler
    measured_temp:
      name: "Water Temperature"
      id: balboa_water_temp
      unit_of_measurement: "°${UNITS}"
      accuracy_decimals: 0
      device_class: temperature
    set_temp:
      name: "Set Temperature"
      id: balboa_set_temp
      unit_of_measurement: "°${UNITS}"
      accuracy_decimals: 0
      device_class: temperature
  # Independent water-temp probe — bulk water reading, not the manifold the
  # Balboa panel sees. Used for UA estimation in the heating experiment.
  - platform: dallas_temp
    # address: 0x0000000000000000   # TODO fill in from boot log after first flash
    name: "Water Temperature (probe)"
    id: ext_water_temp
    update_interval: 30s
    accuracy_decimals: 1
  # Outdoor ambient near the tub — heat-loss driver for UA modelling.
  # DISABLED until the second DS18B20 is physically wired. With no address
  # pinned and only one device on the bus, ESPHome bound BOTH entries to
  # the same physical sensor (ambient just mirrored water). Re-enable when
  # sensor #2 is on the bus and pin addresses on both blocks so the binding
  # is stable. Will need a logger.level: DEBUG flash to discover addresses.
  # - platform: dallas_temp
  #   # address: 0x0000000000000000   # TODO fill in from boot log
  #   name: "Ambient Temperature"
  #   id: ext_ambient_temp
  #   update_interval: 30s
  #   accuracy_decimals: 1
  # Cabinet temp + humidity (DHT11 — ±2°C / ±5%RH, treat as indicative only).
  - platform: dht
    pin: GPIO13
    model: DHT11
    update_interval: 30s
    temperature:
      name: "Cabinet Temperature"
      id: cabinet_temp
      accuracy_decimals: 1
    humidity:
      name: "Cabinet Humidity"
      id: cabinet_humidity
      accuracy_decimals: 0
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic
  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic

binary_sensor:
  - platform: inputs
    parent_id: display_handler
    type: heater
    name: "Heater"
    id: balboa_heater
  - platform: inputs
    parent_id: display_handler
    type: pump
    name: "Pump (motor running)"   # NOT "jets pressed" — see comment in esp32-spa.h
    id: balboa_pump
  - platform: inputs
    parent_id: display_handler
    type: light
    name: "Light"
    id: balboa_light
  - platform: inputs
    parent_id: display_handler
    type: blower
    name: "Blower"
    id: balboa_blower
  # Hot tub lid open/close — reed switch on GPIO14, other side to GND.
  # Normally-open reed + internal pull-up: magnet present (lid closed) =
  # contact closed = pin LOW = HA "off" = Closed. Magnet absent (lid open)
  # = pin HIGH (pull-up) = HA "on" = Open. Matches device_class: opening.
  - platform: gpio
    name: "Lid Open"
    id: lid_open
    device_class: opening
    pin:
      number: GPIO14
      mode:
        input: true
        pullup: true
    filters:
      # Debounce: reed bounce on close + lid wobble on open
      - delayed_on: 50ms
      - delayed_off: 50ms

text_sensor:
  - platform: inputs
    parent_id: display_handler
    type: error_code
    name: "Error Code"
  # Diagnostics consumed by the HA dashboard's "Device health" card.
  - platform: version
    name: "ESPHome Version"
    entity_category: diagnostic
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic

# ===== Button write — high-impedance idle, brief OUTPUT-HIGH for press =====
# CRITICAL: previous design used `output: platform: gpio` which configures the
# pin as OUTPUT-LOW at idle. That actively pulled each button line to 0 V
# continuously — and crucially, since the button lines are BIDIRECTIONAL
# (board echoes panel-button presses back on the matching line as ~200ms HIGH
# pulses), our active-LOW idle drive SUPPRESSED panel echoes. Result: panel
# buttons became unresponsive while HA-driven presses still worked. Diagnosed
# live 2026-06-23 evening.
#
# Fix: leave the pins as INPUT (high-impedance) at idle so the board is free
# to drive its own echoes. To press, briefly set OUTPUT HIGH, then release
# back to INPUT. We use raw esp-idf GPIO calls in lambdas (the `output:`
# platform doesn't support dynamic mode switching).
#
# Wiring unchanged: each tap pin via 1 kΩ to GPIO. Spa board has its own
# internal pull-down so lines naturally sit at 0 V when nobody's driving.
button:
  - platform: template
    name: "Press Light"
    id: btn_press_light
    on_press:
      - lambda: |-
          gpio_set_direction(GPIO_NUM_33, GPIO_MODE_OUTPUT);
          gpio_set_level(GPIO_NUM_33, 1);
      - delay: ${press_pulse}
      - lambda: |-
          gpio_set_level(GPIO_NUM_33, 0);
          gpio_set_direction(GPIO_NUM_33, GPIO_MODE_INPUT);
  - platform: template
    name: "Press Jets"
    id: btn_press_jets
    on_press:
      - lambda: |-
          gpio_set_direction(GPIO_NUM_4, GPIO_MODE_OUTPUT);
          gpio_set_level(GPIO_NUM_4, 1);
      - delay: ${press_pulse}
      - lambda: |-
          gpio_set_level(GPIO_NUM_4, 0);
          gpio_set_direction(GPIO_NUM_4, GPIO_MODE_INPUT);
  - platform: template
    name: "Press Blower"
    id: btn_press_blower
    on_press:
      - lambda: |-
          gpio_set_direction(GPIO_NUM_16, GPIO_MODE_OUTPUT);
          gpio_set_level(GPIO_NUM_16, 1);
      - delay: ${press_pulse}
      - lambda: |-
          gpio_set_level(GPIO_NUM_16, 0);
          gpio_set_direction(GPIO_NUM_16, GPIO_MODE_INPUT);
  - platform: template
    name: "Press Temp"
    id: btn_press_temp
    on_press:
      - lambda: |-
          gpio_set_direction(GPIO_NUM_17, GPIO_MODE_OUTPUT);
          gpio_set_level(GPIO_NUM_17, 1);
      - delay: ${press_pulse}
      - lambda: |-
          gpio_set_level(GPIO_NUM_17, 0);
          gpio_set_direction(GPIO_NUM_17, GPIO_MODE_INPUT);
  - platform: template
    name: "Walk Setpoint to Target Now"
    id: btn_walk_now
    on_press:
      - script.execute: walk_setpoint

# ===== Closed-loop setpoint controller =====
# Target temperature exposed as a HA `number` (26-40, integer steps).
# Setting the number does NOT auto-fire the controller — user must explicitly
# press `btn_walk_now` to start the walk. This avoids surprising spa-state
# changes at boot (would otherwise fire if ESPHome restored an initial_value).
# Original v1 had `initial_value: 36` + `on_value: walk_setpoint` which walked
# the setpoint on every boot — removed.
number:
  - platform: template
    name: "Target Setpoint"
    id: target_setpoint
    optimistic: true
    min_value: 26
    max_value: 40
    step: 1
    unit_of_measurement: "°${UNITS}"
    mode: box
    # No initial_value, no on_value — explicit trigger only via btn_walk_now

# Guard counter for the walk-setpoint loop.
globals:
  - id: walk_guard
    type: int
    initial_value: '0'

# Ride-the-bounce setpoint walker. Ported from sim/setpoint_sim.py.
# Algorithm:
#   1. Press temp button once — wakes set-mode, reveals current setpoint (no
#      change), decoder will populate balboa_set_temp within ~1.5 s.
#   2. While decoded set_temp != target (and within safety guard): press,
#      wait for decoder to catch up, re-check.
#   3. Stop pressing; spa commits the displayed value after ~3 s of no
#      presses (set-mode timeout).
# Convergence: bounce-handling is built into the panel's UI — at a limit it
# reverses direction. Worst case is ~28 presses (per sim across all
# start/target/direction combinations); guard at 35.
script:
  - id: walk_setpoint
    mode: restart   # if user changes target mid-walk, restart from scratch
    then:
      - logger.log:
          format: "walk_setpoint: target=%d, starting"
          args: ['(int) id(target_setpoint).state']
      - lambda: 'id(walk_guard) = 0;'
      # Wake press — reveals current setpoint, no change to value
      - button.press: btn_press_temp
      - delay: ${walk_interpress}   # let decoder pick up the revealed setpoint
      - while:
          condition:
            lambda: |-
              float current = id(balboa_set_temp).state;
              // If decoder hasn't populated yet (nan), keep pressing — we
              // need a reading to compare.
              if (isnan(current)) return true;
              // Safety: never exceed worst-case + margin
              if (id(walk_guard) >= ${walk_max_iters}) return false;
              return (int) current != (int) id(target_setpoint).state;
          then:
            - button.press: btn_press_temp
            - delay: ${walk_interpress}
            - lambda: 'id(walk_guard)++;'
      - logger.log:
          format: "walk_setpoint: matched (or guard hit), settling. presses=%d"
          args: ['id(walk_guard)']
      - delay: ${walk_commit_wait}    # set-mode timeout → spa commits value
      - logger.log: "walk_setpoint: done"

  # One-shot setpoint capture at boot. Waits for the spa to come out of priming
  # (decoder reporting a real water temperature = bus alive + numeric display
  # restored) then sends a single Temp press to reveal the current setpoint.
  # Without this, set_temp stays "unknown" in HA until the user (or HA
  # automation) interacts — which broke the "what's my current setpoint?"
  # question for the first N minutes after every boot.
  - id: capture_setpoint_at_boot
    then:
      - delay: 45s    # priming cycle is ~30-60s; conservative wait
      - wait_until:
          condition:
            lambda: 'return !isnan(id(balboa_water_temp).state);'
          timeout: 120s
      - logger.log: "boot: priming complete, capturing setpoint via single Temp press"
      - button.press: btn_press_temp

# Periodic setpoint refresh — every 30 min press Temp once to wake set-mode
# and let the decoder re-capture the setpoint. Belt-and-braces against HA
# missing a refresh (HA-side automation does the same job; either is enough).
interval:
  - interval: 30min
    then:
      - logger.log: "periodic: refreshing setpoint via single Temp press"
      - button.press: btn_press_temp
