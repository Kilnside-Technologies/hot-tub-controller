# 2-channel diagnostic sniffer on the DECODER's read pins.
# Use AFTER moving the wires, to confirm clock + data actually reach GPIO34/35:
#   data  (white/blue, pin 5) -> GPIO34   expect ~42,000/min, jumpy
#   clock (orange,     pin 6) -> GPIO35   expect ~144,000/min, steady
# Read over WiFi: browser http://balboa-sniff3435.local/ (or the IP), or the
# "sniff:" log line. Needs esphome/secrets.yaml (same one decoder.yaml uses).
#
# If 35 shows ~144k and 34 ~42k  -> signals are on the right pins; reflash decoder.yaml.
# If either is 0                 -> that wire isn't on its pin / not grounded.

esphome:
  name: balboa-sniff3435

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "balboa-sniff3435-fb"
    password: !secret ota_password

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

logger:
  level: INFO

sensor:
  - platform: pulse_counter
    pin: GPIO34
    id: c_data
    name: "GPIO34 data"
    update_interval: 1s
    internal_filter: 1us
    count_mode: { rising_edge: INCREMENT, falling_edge: INCREMENT }
  - platform: pulse_counter
    pin: GPIO35
    id: c_clock
    name: "GPIO35 clock"
    update_interval: 1s
    internal_filter: 1us
    count_mode: { rising_edge: INCREMENT, falling_edge: INCREMENT }

interval:
  - interval: 1s
    then:
      - lambda: |-
          ESP_LOGI("sniff", "data(34)=%.0f  clock(35)=%.0f",
            id(c_data).state, id(c_clock).state);
