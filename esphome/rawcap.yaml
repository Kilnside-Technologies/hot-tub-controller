# Raw display-bus capture — ONE flash collects everything:
#   - is the clock/data signal reaching GPIO35/34 (clk/s, frames)?
#   - the RAW frame bits (raw, p1..p4) to reverse-engineer the decode.
# Wiring: clock (orange) -> GPIO35, data (white/blue) -> GPIO34, GND common.
# Read over WiFi: browser http://balboa-rawcap.local/ ("Capture" line) or
# `esphome logs esphome/rawcap.yaml` (the "rawcap:" line). Needs secrets.yaml.

esphome:
  name: balboa-rawcap
  includes:
    - rawcap.h
  on_boot:
    priority: -100
    then:
      - lambda: "rawcap_setup();"

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "balboa-rawcap-fb"
    password: !secret ota_password

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

logger:
  level: INFO

text_sensor:
  - platform: template
    name: "Capture"
    id: cap_text

interval:
  - interval: 1s
    then:
      - lambda: "id(cap_text).publish_state(rawcap_report());"
