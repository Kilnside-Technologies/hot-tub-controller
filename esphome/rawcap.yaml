# Raw display-bus capture — logs every DISTINCT frame (to catch brief status
# flashes) + a clk/s rate. Read over WiFi: browser http://balboa-rawcap.local/
# ("Frame" = latest distinct frame, "Rate" = clk/s) or `esphome logs` (tags
# "frame:" and "rawcap:"). Wiring: clock(orange)->GPIO35, data(white/blue)->GPIO34.
# Mapping workflow: set a state, read Frame; toggle ONE control, read the new Frame.

esphome:
  name: balboa-rawcap
  includes:
    - rawcap.h
  on_boot:
    priority: -100
    then:
      - lambda: "rawcap_setup();"

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "balboa-rawcap-fb"
    password: !secret ota_password

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

logger:
  level: INFO

text_sensor:
  - platform: template
    name: "Frame"
    id: cap_frame
  - platform: template
    name: "Rate"
    id: cap_rate

interval:
  - interval: 250ms
    then:
      - lambda: |-
          std::string s = rawcap_drain();
          if (!s.empty()) id(cap_frame).publish_state(s);
  - interval: 1s
    then:
      - lambda: "id(cap_rate).publish_state(rawcap_summary());"
