# Solar surplus -> hot tub ON
#
# Drop into a packages: file, or copy into automations.yaml under the
# automation: list. Entity IDs below assume the ESPHome device `hot-tub`
# (HA entities `hot_tub_*`) and a Shelly contactor relay `hot_tub_contactor`.
#
# There is no climate entity — set the target via number.hot_tub_target_setpoint
# then press button.hot_tub_walk_setpoint_to_target_now to walk the panel to it.
#
# CONFIRM these against your install before enabling:
#   - sensor.solis_grid_exported_power                 (Solis MQTT/Modbus integration)
#   - switch.hot_tub_contactor                         (Shelly contactor relay)
#   - number.hot_tub_target_setpoint                   (this repo's ESPHome device)
#   - button.hot_tub_walk_setpoint_to_target_now       (this repo's ESPHome device)
#   - sensor.hot_tub_water_temperature                 (this repo's ESPHome device)

- id: hot_tub_solar_surplus_on
  alias: "Hot Tub: solar surplus ON"
  description: >
    Energise the hot tub contactor and ramp target to 38 °C when the Solis
    is exporting >2 kW for 5 minutes during peak solar hours and the water
    is below 38 °C.
  mode: single
  max_exceeded: silent

  trigger:
    - platform: numeric_state
      entity_id: sensor.solis_grid_exported_power
      above: 2000
      # Sustained 5 min — only fire when surplus is real, not a cloud-edge spike.
      for:
        minutes: 5

  condition:
    # Don't reheat if already hot.
    - condition: numeric_state
      entity_id: sensor.hot_tub_water_temperature
      below: 38
    # Don't try to engage if the contactor is already on (idempotency).
    - condition: state
      entity_id: switch.hot_tub_contactor
      state: "off"
    # Peak solar window only — outside this, surplus is unlikely to last.
    - condition: time
      after: "08:00:00"
      before: "18:00:00"

  action:
    # 1. Energise mains supply to the tub.
    - service: switch.turn_on
      target:
        entity_id: switch.hot_tub_contactor

    # 2. Give the Balboa board time to boot and the ESP32 to reconnect to HA
    #    before driving the panel.
    - delay:
        seconds: 30

    # 3. Set target setpoint, then walk the panel to it (range 26–40).
    - service: number.set_value
      target:
        entity_id: number.hot_tub_target_setpoint
      data:
        value: 38
    - service: button.press
      target:
        entity_id: button.hot_tub_walk_setpoint_to_target_now

    # 4. Notify (templated so the message is useful in logs).
    - service: notify.notify
      data:
        title: "Hot tub: heating from solar"
        message: >
          Solar export {{ states('sensor.solis_grid_exported_power') }} W,
          water at {{ states('sensor.hot_tub_water_temperature') }} °C.
          Target 38 °C.
