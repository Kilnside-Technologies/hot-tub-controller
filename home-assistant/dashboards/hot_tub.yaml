# Lovelace card for the hot tub view.
#
# Drop this into a `cards:` list on an existing Lovelace view, or wrap as a
# standalone view in your dashboard YAML. Entity IDs assume:
#   - ESPHome device `hot-tub` => entities prefixed `hot_tub_*`. Water temp is
#     exposed natively (sensor.hot_tub_water_temperature, decoded off the panel
#     display bus) — no template sensor needed.
#   - Shelly EM Gen3 named `hot_tub_em` => sensor.hot_tub_em_power, _energy
#   - Shelly contactor relay => switch.hot_tub_contactor
#   - Solis integration => sensor.solis_grid_exported_power
# CONFIRM all entity IDs against your install.
#
# Control model: there is no climate entity. Set the target via
# number.hot_tub_target_setpoint, then press button.hot_tub_walk_setpoint_to_target_now
# to walk the panel to it. Pump/light/blower are read-only state (binary_sensor)
# plus momentary press buttons.

type: vertical-stack
cards:
  # Current water temperature — at-a-glance gauge.
  - type: gauge
    entity: sensor.hot_tub_water_temperature
    name: Water temperature
    unit: "°C"
    min: 20
    max: 42
    needle: true
    severity:
      green: 0      # < 36 °C  - cool / heating
      yellow: 36    # 36–40 °C - sweet spot
      red: 40       # > 40 °C  - hot / cap

  # Setpoint control — set the target, then press Walk to apply it.
  - type: entities
    title: Setpoint
    state_color: true
    entities:
      - entity: number.hot_tub_target_setpoint
        name: Target
      - entity: button.hot_tub_walk_setpoint_to_target_now
        name: Apply (walk to target)
      - entity: sensor.hot_tub_set_temperature
        name: Panel setpoint (readback)

  # Live state — read-only, decoded off the display bus.
  - type: glance
    title: State
    show_state: true
    columns: 5
    entities:
      - entity: binary_sensor.hot_tub_heater
        name: Heater
      - entity: binary_sensor.hot_tub_pump_motor_running
        name: Pump
      - entity: binary_sensor.hot_tub_light
        name: Light
      - entity: binary_sensor.hot_tub_blower
        name: Blower
      - entity: binary_sensor.hot_tub_lid_open
        name: Lid

  # Panel buttons — momentary presses injected over the display bus.
  - type: horizontal-stack
    cards:
      - type: button
        name: Light
        entity: button.hot_tub_press_light
        tap_action:
          action: toggle
      - type: button
        name: Jets
        entity: button.hot_tub_press_jets
        tap_action:
          action: toggle
      - type: button
        name: Blower
        entity: button.hot_tub_press_blower
        tap_action:
          action: toggle
      - type: button
        name: Temp
        entity: button.hot_tub_press_temp
        tap_action:
          action: toggle

  # Environment — probe water temp + ambient + cabinet.
  - type: entities
    title: Environment
    entities:
      - entity: sensor.hot_tub_water_temperature_probe
        name: Water (probe)
      - entity: sensor.hot_tub_ambient_temperature
        name: Ambient
      - entity: sensor.hot_tub_cabinet_temperature
        name: Cabinet temp
      - entity: sensor.hot_tub_cabinet_humidity
        name: Cabinet humidity
      - entity: sensor.hot_tub_error_code
        name: Error code

  # Power & energy + contactor + solar export context.
  - type: entities
    title: Power
    state_color: true
    entities:
      - entity: sensor.hot_tub_em_power
        name: Current power
      - entity: sensor.hot_tub_em_energy
        name: Today's energy
      - entity: sensor.solis_grid_exported_power
        name: Solar export
      - type: divider
      - entity: switch.hot_tub_contactor
        name: Mains contactor
        secondary_info: last-changed

  # 24 h water temp trend.
  - type: history-graph
    title: Water temperature (24 h)
    hours_to_show: 24
    refresh_interval: 60
    entities:
      - entity: sensor.hot_tub_water_temperature
        name: Water
      - entity: sensor.hot_tub_set_temperature
        name: Setpoint
